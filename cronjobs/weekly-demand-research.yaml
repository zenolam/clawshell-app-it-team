key: weekly-demand-research
name: weekly-demand-research
schedule: "0 9 * * 5"
agentId: marketing
prompt: |
  使用 gemini-deep-research-using-web 技能，执行以下调研任务：

  ## 调研目标
  针对过去一周，面向个人用户和小团队（1-20人）的潜在产品需求进行深度调研。

  ## 调研范围
  必须覆盖国内外主流论坛和社区：
  - **国际**：Hacker News、Reddit、Product Hunt、Twitter/X、Indie Hackers
  - **国内**：V2EX、即刻、小红书、少数

  ## 调研要求
  1. 聚焦过去 7 天内出现的新需求、新痛点、新趋势
  2. 关注用户明确表达"希望有这样的工具"、"有没有人做"、"求推荐"等需求信号
  3. 特别关注用户提及付费意愿的内容（如"愿意付费"、"买断也行"、"订阅也可以"）
  4. 排除已有成熟解决方案且市场饱和的需求

  ## 输出格式
  从调研结果中挑选 Top 10 最具潜力的需求，按付费意愿优先排序。

  每条需求包含：
  - **需求标题**：一句话概括
  - **来源**：原始讨论链接
  - **目标用户**：个人/小团队中的哪一类
  - **痛点描述**：用户原话或摘要
  - **付费信号**：是否有明确付费意愿（是/否/强烈）
  - **市场空白度**：高/中/低（现有竞品多少）
  - **实现难度**：高/中/低

  ## 重要
  - 如果调研结果为英文，必须翻译成简体中文
  - 将最终报告保存为 md 文件，路径：`research/{yyyy-MM-dd}-weekly-demand-top10.md`
